<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Stefan.8894</title>
    <style>
        :root {
            --primary-color: #ff0000;
            --primary-hover: #cc0000;
            --bg-main: #1a1a1a;
            --bg-card: #262626;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --success-color: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: #111;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid var(--primary-color);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .cart-icon {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .cart-icon:hover {
            background-color: var(--primary-hover);
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            text-align: center;
            margin-bottom: 30px;
        }

        .product-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid #333;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .product-img:hover {
            transform: scale(1.02);
        }

        .price {
            font-size: 28px;
            color: var(--success-color);
            font-weight: bold;
            margin: 10px 0;
        }

        .stock-info {
            color: #ff9800;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .delivery-info {
            background-color: #333;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin: 15px 0;
            border-left: 4px solid var(--success-color);
            text-align: left;
        }

        /* Sectiune Coduri Reducere */
        .promo-section {
            background-color: #1f1f1f;
            border: 1px dashed #555;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
        }

        .promo-section h4 {
            margin: 0 0 10px 0;
            color: #ff9800;
        }

        .coupon-code {
            display: inline-block;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            color: #fff;
            border: 1px solid #444;
        }

        .btn-add, .btn-send, .btn-promo {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add:hover, .btn-send:hover, .btn-promo:hover {
            background-color: var(--primary-hover);
        }

        .btn-promo {
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
            margin-left: 10px;
        }

        .promo-input-group {
            display: flex;
            margin: 15px 0;
        }

        .promo-input-group input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
        }

        /* Sectiune Cos */
        .cart-page {
            width: 100%;
            max-width: 600px;
            background-color: #222;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

            margin-top: 0;
            border-bottom: 1px solid #333;
