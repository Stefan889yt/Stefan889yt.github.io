<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urmareste comanda ta - Stefan.8894</title>
    <style>
        :root {
            --primary-color: #ff0000;
            --primary-hover: #cc0000;
            --bg-main: #1a1a1a;
            --bg-card: #262626;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --success-color: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid #333;
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
            text-align: center;
        }

        textarea {
            resize: vertical;
            height: 80px;
            text-align: left;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            text-align: left;
            border-left: 4px solid var(--primary-color);
            background-color: #1a1a1a;
        }

        .status-badge {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .status-badge.succes {
            background-color: var(--success-color);
        }

        .descriere-text {
            font-size: 15px;
            line-height: 1.4;
            color: #eee;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        /* Sectiune Actiuni Comanda */
        .actions-area {
            margin-top: 15px;
            display: none;
        }

        .btn-action {
            background-color: #555;
            font-size: 13px;
            padding: 8px 15px;
            width: auto;
        }

        .btn-action:hover {
            background-color: #990000;
        }

        .btn-retur {
            background-color: #ff9800;
        }

        .btn-retur:hover {
            background-color: #e68a00;
        }

        /* Modal/Popup pentru Securitate Actiuni (Anulare / Retur) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #444;
            text-align: left;
        }

        .modal-content h3 {
            margin-top: 0;
            color: white;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-modal-cancel {
            background-color: #555;
        }
        .btn-modal-cancel:hover {
            background-color: #444;
        }

        /* Sectiune Recuperare Cod */
        .recovery-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .btn-toggle-recovery {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px dashed #444;
            font-size: 13px;
            text-transform: none;
            padding: 8px;
            cursor: pointer;
            width: 100%;
        }

        .btn-toggle-recovery:hover {
            background-color: #333;
            color: white;
        }

        .recovery-fields {
            display: none;
            margin-top: 15px;
            text-align: left;
        }

        .recovery-fields label {
            font-size: 12px;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
        }

        .btn-recover {
            background-color: #444;
            font-size: 14px;
        }

        .btn-recover:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <form id="action-email-form" action="https://formspree.io/f/xdaqnvlk" method="POST" style="display: none;">
        <input type="text" name="TIP_SOLICITARE" id="email-action-type">
        <input type="text" name="COD_COMANDA" id="email-action-code">
        <input type="text" name="Nume_Client" id="email-action-name">
        <input type="text" name="Telefon_Client" id="email-action-phone">
    </form>

    <div class="modal" id="security-modal">
        <div class="modal-content">
            <h3 id="modal-title">Securitate Comandă</h3>
            <p id="modal-subtitle" style="color: var(--text-muted); font-size: 13px; margin-bottom: 15px;">Introdu datele folosite la plasarea comenzii pentru confirmare.</p>
            
            <label style="font-size: 12px; color: #aaa;">Nume complet din comandă:</label>
            <input type="text" id="sec-nume" placeholder="Nume și Prenume" style="text-align: left;">

            <label style="font-size: 12px; color: #aaa;">Număr de telefon:</label>
            <input type="tel" id="sec-telefon" placeholder="07xxxxxxxx" style="text-align: left;">

            <div id="container-motiv" style="display: none;">
                <label style="font-size: 12px; color: #aaa;">Motivul solicitării returului:</label>
                <textarea id="sec-motiv" placeholder="Ex: Mărimea nu se potrivește, produs defect..."></textarea>
            </div>

            <div class="modal-buttons">
                <button onclick="inchideModal()" class="btn-modal-cancel">Anulează</button>
                <button id="btn-submit-action" onclick="executaActiuneSecurizata()">Confirmă</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>🚚 Urmareste comanda ta</h2>
        <p>Introdu codul unic primit la plasarea comenzii (ex: STF123) pentru a verifica starea livrării.</p>

        <input type="text" id="status-code-input" placeholder="Cod comanda (STF...)" style="text-transform: uppercase;">
        <button onclick="verificaStatus()">Verifică Status</button>

        <div class="result-box" id="result-area">
            <div class="status-badge" id="status-badge">Se încarcă...</div>
            <div class="descriere-text" id="status-desc">Se verifică informațiile...</div>
            
            <div class="actions-area" id="actions-area">
                <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
                
                <button class="btn-action" id="btn-cancel-action" onclick="deschideModal('ANULARE')" style="display: none;">❌ Anulează Comanda</button>
                
                <button class="btn-action btn-retur" id="btn-return-action" onclick="deschideModal('RETUR')" style="display: none;">📦 Solicită Retur</button>
            </div>
        </div>

        <div class="recovery-section">
            <button class="btn-toggle-recovery" onclick="toggleRecoveryForm()">Am pierdut / uitat codul meu</button>
            
            <div class="recovery-fields" id="recovery-form">
                <label for="recovery-name">Nume complet din comandă:</label>
                <input type="text" id="recovery-name" placeholder="Nume și Prenume">

                <label for="recovery-phone">Număr de telefon din comandă:</label>
                <input type="tel" id="recovery-phone" placeholder="07xxxxxxxx">

                <button class="btn-recover" onclick="recupereazaCod()">Recuperează Codul</button>
                
                <div id="recovery-result" style="margin-top: 15px; font-weight: bold; text-align: center; color: var(--success-color);"></div>
            </div>
        </div>

        <br>
        <a class="back-link" href="index.html">⬅ Înapoi la Magazin</a>
    </div>

    <script>
        const BIN_ID = "6a563aa6da38895dfe5bf942";
        const API_KEY = "$2a$10$4VMQMmdCSaGHLFzBFXLhmuxqeQKSPcoq9jFajTw6bf6xmxdoChqu.";
        
        let comandaCurentaDate = null;
        let actiuneCurenta = ""; // Poate fi "ANULARE" sau "RETUR"

        async function verificaStatus() {
            const codIntrodus = document.getElementById('status-code-input').value.trim().toUpperCase();
            const resultArea = document.getElementById('result-area');
            const badge = document.getElementById('status-badge');
            const desc = document.getElementById('status-desc');
            
            const actionsArea = document.getElementById('actions-area');
            const btnCancel = document.getElementById('btn-cancel-action');
            const btnReturn = document.getElementById('btn-return-action');

            if (!codIntrodus) {
                alert("Te rugăm să introduci un cod!");
                return;
            }

            resultArea.style.display = "block";
            actionsArea.style.display = "none"; 
            btnCancel.style.display = "none";
            btnReturn.style.display = "none";

            badge.innerText = "Se încarcă...";
            badge.className = "status-badge";
            desc.innerText = "Se verifică informațiile...";

            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?nocache=${Date.now()}`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                let json = await res.json();
                let comenzi = json.record.statusuriComenzi;

                if (comenzi && comenzi[codIntrodus]) {
                    let comanda = comenzi[codIntrodus];
                    comandaCurentaDate = { ...comanda, cod: codIntrodus };

                    badge.innerText = comanda.status;
                    desc.innerText = comanda.descriere;

                    let statusSimplu = comanda.status.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    statusSimplu = statusSimplu.replace(/[^a-z0-9 ]/g, "").trim();

                    if (statusSimplu.includes("comanda plasata") || statusSimplu.includes("trimisa") || statusSimplu.includes("comanda primita") || statusSimplu.includes("livrata cu succes") || statusSimplu.includes("retur solicitat")) {
                        badge.classList.add("succes");
                    }

                    if (statusSimplu.includes("comanda plasata")) {
                        actionsArea.style.display = "block";
                        btnCancel.style.display = "inline-block";
                    } 
                    else if (statusSimplu.includes("comanda primita") || statusSimplu.includes("livrata cu succes")) {
                        actionsArea.style.display = "block";
                        btnReturn.style.display = "inline-block";
                    }
                } else {
                    badge.innerText = "Eroare";
                    desc.innerText = `Codul "${codIntrodus}" nu a fost găsit în sistem.`;
                    comandaCurentaDate = null;
                }
            } catch (e) {
                console.error(e);
                badge.innerText = "Eroare";
                desc.innerText = "Eroare la conexiunea cu baza de date.";
                comandaCurentaDate = null;
            }
        }

        // DESCHIDERE & INCHIDERE MODAL SECURED
        function deschideModal(tip) {
            actiuneCurenta = tip;
            const modal = document.getElementById('security-modal');
            const title = document.getElementById('modal-title');
            const subtitle = document.getElementById('modal-subtitle');
            const containerMotiv = document.getElementById('container-motiv');
            const btnSubmit = document.getElementById('btn-submit-action');

            modal.style.display = 'flex';

            if (tip === "ANULARE") {
                title.innerText = "❌ Anulare Comandă Securizată";
                subtitle.innerText = "Introdu datele folosite la plasarea comenzii pentru a o anula definitiv.";
                containerMotiv.style.display = "none";
                btnSubmit.innerText = "Anulează Comanda";
            } else if (tip === "RETUR") {
                title.innerText = "📦 Solicitare Retur Securizat";
                subtitle.innerText = "Introdu datele de contact și motivul returului pentru trimiterea cererii.";
                containerMotiv.style.display = "block";
                btnSubmit.innerText = "Trimite Cerere Retur";
            }
        }

        function inchideModal() {
            document.getElementById('security-modal').style.display = 'none';
            document.getElementById('sec-nume').value = '';
            document.getElementById('sec-telefon').value = '';
            document.getElementById('sec-motiv').value = '';
            actiuneCurenta = "";
        }

        // EXECUTIE ACTIUNE SECURIZATA (ANULARE SAU RETUR)
        async function executaActiuneSecurizata() {
            if (!comandaCurentaDate) return;

            const numeIntrodus = document.getElementById('sec-nume').value.trim();
            const telefonIntrodus = document.getElementById('sec-telefon').value.trim();
            const motivIntrodus = document.getElementById('sec-motiv').value.trim();

            if (!numeIntrodus || !telefonIntrodus) {
                alert("Te rugăm să introduci Numele și Telefonul pentru validare!");
                return;
            }

            if (actiuneCurenta === "RETUR" && !motivIntrodus) {
                alert("Te rugăm să introduci motivul pentru care dorești returul!");
                return;
            }

            // Validare de securitate
            const numeSalvat = (comandaCurentaDate.nume || "").trim().toLowerCase();
            const telefonSalvat = (comandaCurentaDate.telefon || "").trim();

            if (numeIntrodus.toLowerCase() !== numeSalvat || telefonIntrodus !== telefonSalvat) {
                alert("Date incorecte! Numele sau numărul de telefon nu se potrivesc cu cele din comandă.");
                return;
            }

            const btnSubmit = document.getElementById('btn-submit-action');
            btnSubmit.innerText = "Se procesează...";
            btnSubmit.disabled = true;

            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?nocache=${Date.now()}`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                let json = await res.json();
                let serverRecord = json.record;

                if (serverRecord.statusuriComenzi && serverRecord.statusuriComenzi[comandaCurentaDate.cod]) {
                    
                    if (actiuneCurenta === "ANULARE") {
                        // Verificăm dacă nu cumva statusul s-a schimbat între timp
                        let st = serverRecord.statusuriComenzi[comandaCurentaDate.cod].status.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        st = st.replace(/[^a-z0-9 ]/g, "").trim();

                        if (!st.includes("comanda plasata")) {
                            alert("Comanda nu mai poate fi anulată deoarece a fost deja procesată/predată curierului!");
                            window.location.reload();
                            return;
                        }

                        // Ștergem comanda din sistem
                        delete serverRecord.statusuriComenzi[comandaCurentaDate.cod];

                        let updateRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                            method: "PUT",
                            headers: {
                                "Content-Type": "application/json",
                                "X-Master-Key": API_KEY
                            },
                            body: JSON.stringify(serverRecord)
                        });

                        if (!updateRes.ok) throw new Error();

                        // Trimitere notificare pe email
                        comandaCurentaDate.nume = numeIntrodus;
                        comandaCurentaDate.telefon = telefonIntrodus;
                        await trimiteNotificareFormspree("ANULARE COMANDA SECURIZATA");

                        alert("Comanda ta a fost anulată cu succes!");

                    } else if (actiuneCurenta === "RETUR") {
                        // Actualizăm statusul în bază în "Retur solicitat"
                        serverRecord.statusuriComenzi[comandaCurentaDate.cod].status = "Retur solicitat";
                        serverRecord.statusuriComenzi[comandaCurentaDate.cod].descriere = `Cererea de retur a fost înregistrată. Motivul transmis: "${motivIntrodus}". Te vom contacta curând!`;

                        let updateRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                            method: "PUT",
                            headers: {
                                "Content-Type": "application/json",
                                "X-Master-Key": API_KEY
                            },
                            body: JSON.stringify(serverRecord)
                        });

                        if (!updateRes.ok) throw new Error();

                        // Trimitere notificare pe email
                        comandaCurentaDate.nume = numeIntrodus;
                        comandaCurentaDate.telefon = telefonIntrodus;
                        await trimiteNotificareFormspree(`SOLICITARE RETUR SECURIZAT (Motiv: ${motivIntrodus})`);

                        alert("Solicitarea ta de retur a fost înregistrată cu succes!");
                    }

                    inchideModal();
                    window.location.reload();
                }
            } catch (error) {
                console.error(error);
                alert("A apărut o problemă la conexiunea cu baza de date. Încearcă din nou.");
            } finally {
                btnSubmit.innerText = "Confirmă";
                btnSubmit.disabled = false;
            }
        }

        async function trimiteNotificareFormspree(tip) {
            document.getElementById('email-action-type').value = tip;
            document.getElementById('email-action-code').value = comandaCurentaDate.cod;
            document.getElementById('email-action-name').value = comandaCurentaDate.nume || "Nespecificat";
            document.getElementById('email-action-phone').value = comandaCurentaDate.telefon || "Nespecificat";

            const actionForm = document.getElementById('action-email-form');
            let formData = new FormData(actionForm);

            await fetch(actionForm.action, {
                method: actionForm.method,
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
        }

        function toggleRecoveryForm() {
            const form = document.getElementById('recovery-form');
            form.style.display = form.style.display === "block" ? "none" : "block";
        }

        async function recupereazaCod() {
            const numeCautat = document.getElementById('recovery-name').value.trim().toLowerCase();
            const telefonCautat = document.getElementById('recovery-phone').value.trim();
            const afisajRezultat = document.getElementById('recovery-result');

            if (!numeCautat || !telefonCautat) {
                alert("Te rugăm să completezi ambele câmpuri!");
                return;
            }

            afisajRezultat.innerText = "Se caută...";
            afisajRezultat.style.color = "var(--text-muted)";

            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?nocache=${Date.now()}`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                let json = await res.json();
                let comenzi = json.record.statusuriComenzi;

                let codGasit = null;

                if (comenzi) {
                    for (let cod in comenzi) {
                        let c = comenzi[cod];
                        if (c.nume && c.telefon) {
                            if (c.nume.toLowerCase() === numeCautat && c.telefon === telefonCautat) {
                                codGasit = cod;
                                break;
                            }
                        }
                    }
                }

                if (codGasit) {
                    afisajRezultat.innerHTML = `Codul tău este:<br><span style="font-size: 20px; color: #ff0000; letter-spacing: 1px;">${codGasit}</span>`;
                    afisajRezultat.style.color = "var(--success-color)";
                    document.getElementById('status-code-input').value = codGasit;
                } else {
                    afisajRezultat.innerText = "Nu s-a găsit nicio comandă activă cu aceste date!";
                    afisajRezultat.style.color = "#ff0000";
                }
            } catch (e) {
                console.error(e);
                afisajRezultat.innerText = "Eroare la căutare.";
                afisajRezultat.style.color = "#ff0000";
            }
        }
    </script>
</body>
</html>
