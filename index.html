<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazin Stefan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header {
            background-color: #222;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff0000;
        }
        header h1 {
            margin: 0;
            font-size: 24px;
            color: #ff0000;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #ff0000;
        }
        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .products-section {
            flex: 2;
            min-width: 300px;
        }
        .cart-section {
            flex: 1;
            min-width: 300px;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            height: fit-content;
        }
        .grid-produse {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .produs-card {
            background-color: #222;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #333;
            transition: transform 0.3s, border-color 0.3s;
        }
        .produs-card:hover {
            transform: translateY(-5px);
            border-color: #ff0000;
        }
        .produs-img {
            width: 100%;
            height: 180px;
            background-color: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 15px;
        }
        .produs-card h3 {
            margin: 10px 0 5px 0;
            font-size: 18px;
        }
        .produs-card .pret {
            color: #ff0000;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .btn-adauga {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-adauga:hover {
            background-color: #cc0000;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .cart-item span {
            font-size: 14px;
        }
        .btn-cantitate {
            background-color: #444;
            color: white;
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 3px;
        }
        .promo-box {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        .promo-box input {
            width: calc(100% - 100px);
            padding: 10px;
            background-color: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 6px 0 0 6px;
            box-sizing: border-box;
        }
        .promo-box button {
            width: 90px;
            padding: 10px;
            background-color: #2196f3;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            float: right;
        }
        .cart-total {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .reducere-text {
            color: #4caf50;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .btn-trimite {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-trimite:hover {
            background-color: #43a047;
        }
    </style>
</head>
<body>

    <header>
        <h1>🛒 Magazin Stefan</h1>
        <div class="nav-links">
            <a href="status.html">🚚 Status Comandă</a>
            <a href="secret.html">🔒 Admin</a>
        </div>
    </header>

    <div class="container">
        <div class="products-section">
            <h2>Produse Disponibile</h2>
            <div class="grid-produse">
                
                <div class="produs-card">
                    <div class="produs-img">🔑</div>
                    <h3>Breloc Personalizat</h3>
                    <div class="pret">15.50 RON</div>
                    <button class="btn-adauga" onclick="adaugaInCos('Breloc Personalizat', 15.50)">Adaugă în coș</button>
                </div>

                <div class="produs-card">
                    <div class="produs-img">👕</div>
                    <h3>Tricou Oficial</h3>
                    <div class="pret">45.00 RON</div>
                    <button class="btn-adauga" onclick="adaugaInCos('Tricou Oficial', 45.00)">Adaugă în coș</button>
                </div>

                <div class="produs-card">
                    <div class="produs-img">☕</div>
                    <h3>Cană Personalizată</h3>
                    <div class="pret">25.00 RON</div>
                    <button class="btn-adauga" onclick="adaugaInCos('Cană Personalizată', 25.00)">Adaugă în coș</button>
                </div>

            </div>
        </div>

        <div class="cart-section">
            <h2>Coșul Tău</h2>
            <div id="cart-items-container">
                <p style="color: #888; font-style: italic;">Coșul este gol.</p>
            </div>

            <div class="promo-box">
                <input type="text" id="promo-input" placeholder="Cod Reducere">
                <button onclick="aplicaPromo()">Aplică</button>
                <div id="reducere-notificare" class="reducere-text"></div>
            </div>

            <div class="cart-total">
                <span>Total:</span>
                <span id="total-price">0.00 RON</span>
            </div>

            <button class="btn-trimite" onclick="finalizeazaComanda()">Finalizează Comanda</button>
        </div>
    </div>

    <script>
        // DATELE TALE JSONBIN INTEGRATE
        const BIN_ID = "6a563aa6da38895dfe5bf942"; 
        const API_KEY = "$2a$10$4VMQMmdCSaGHLFzBFXLhmuxqeQKSPcoq9jFajTw6bf6xmxdoChqu.";

        let cos = {};
        let reducereAplicata = { tip: "suma", valoare: 0, cod: "" };

        function adaugaInCos(nume, pret) {
            if (cos[nume]) {
                cos[nume].cantitate += 1;
            } else {
                cos[nume] = { pret: pret, cantitate: 1 };
            }
            actualizeazaCos();
        }

        function modificaCantitate(nume, schimbare) {
            if (!cos[nume]) return;
            cos[nume].cantitate += schimbare;
            if (cos[nume].cantitate <= 0) {
                delete cos[nume];
            }
            actualizeazaCos();
        }

        function actualizeazaCos() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = "";

            let subtotal = 0;
            let areElemente = false;

            for (let nume in cos) {
                areElemente = true;
                let item = cos[nume];
                let itemTotal = item.pret * item.cantitate;
                subtotal += itemTotal;

                container.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <strong>${nume}</strong><br>
                            <small>${item.pret.toFixed(2)} RON</small>
                        </div>
                        <div>
                            <button class="btn-cantitate" onclick="modificaCantitate('${nume}', -1)">-</button>
                            <span>${item.cantitate}</span>
                            <button class="btn-cantitate" onclick="modificaCantitate('${nume}', 1)">+</button>
                        </div>
                    </div>
                `;
            }

            if (!areElemente) {
                container.innerHTML = '<p style="color: #888; font-style: italic;">Coșul este gol.</p>';
                document.getElementById('total-price').innerText = "0.00 RON";
                document.getElementById('reducere-notificare').style.display = "none";
                reducereAplicata = { tip: "suma", valoare: 0, cod: "" };
                return;
            }

            // Calculam reducerea
            let totalFinal = subtotal;
            if (reducereAplicata.valoare > 0) {
                if (reducereAplicata.tip === "procent") {
                    let discount = (subtotal * reducereAplicata.valoare) / 100;
                    totalFinal = subtotal - discount;
                } else if (reducereAplicata.tip === "suma") {
                    totalFinal = subtotal - reducereAplicata.valoare;
                }
            }

            if (totalFinal < 0) totalFinal = 0;

            document.getElementById('total-price').innerText = totalFinal.toFixed(2) + " RON";
        }

        async function aplicaPromo() {
            const codIntrodus = document.getElementById('promo-input').value.trim().toUpperCase();
            if (!codIntrodus) return alert("Introdu un cod de reducere!");

            try {
                // Citim codurile active din JSONbin (adaugam timestamp anti-cache)
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?nocache=${Date.now()}`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                let json = await res.json();
                let coduri = json.record.coduriReducere;

                if (coduri && coduri[codIntrodus]) {
                    let promo = coduri[codIntrodus];
                    reducereAplicata = { tip: promo.tip, valoare: promo.valoare, cod: codIntrodus };
                    
                    const notif = document.getElementById('reducere-notificare');
                    let textReducere = promo.tip === "procent" ? `${promo.valoare}%` : `${promo.valoare} RON`;
                    notif.innerText = `Cod aplicat: ${codIntrodus} (-${textReducere})`;
                    notif.style.display = "block";
                    
                    actualizeazaCos();
                    alert("Codul de reducere a fost aplicat cu succes!");
                } else {
                    alert("Codul de reducere nu este valid sau a expirat!");
                }
            } catch (e) {
                alert("Eroare la verificarea codului promo!");
            }
        }

        function finalizeazaComanda() {
            let areElemente = Object.keys(cos).length > 0;
            if (!areElemente) return alert("Coșul tău este gol!");
            
            let mesaj = "Comanda ta a fost înregistrată! Trimite-i lui Ștefan detalii despre plată.\n\nProduse comandate:\n";
            for (let nume in cos) {
                mesaj += `- ${nume} x ${cos[nume].cantitate}\n`;
            }
            mesaj += `\nTotal de plată: ${document.getElementById('total-price').innerText}`;
            
            alert(mesaj);
            // Opțional se poate curăța coșul după finalizare
            cos = {};
            actualizeazaCos();
        }
    </script>
</body>
</html>
