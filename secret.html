<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panou Secret Stefan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        .back-btn {
            background-color: #222;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #444;
            transition: background 0.3s;
        }
        .back-btn:hover { background-color: #333; }
        .box {
            background-color: #222;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            background-color: #ff0000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #cc0000; }
        #admin-panels { display: none; }
        .item-list {
            margin-top: 15px;
            background: #111;
            padding: 10px;
            border-radius: 6px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
        }
        .item-list div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #222;
            font-size: 14px;
        }
        .delete-btn {
            background: #cc0000;
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 4px;
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <a class="back-btn" href="index.html">⬅ Înapoi la Magazin</a>
    </header>

    <div class="box" id="login-box">
        <h2>🔒 Panou Administrator Secret</h2>
        <p>Introdu parola ta de acces:</p>
        <input type="password" id="pass-input" placeholder="Parola ta secretă">
        <button onclick="verificaParola()">Intră în Panou</button>
    </div>

    <div id="admin-panels" style="width: 100%; max-width: 600px;">
        <div class="box">
            <h2>⚙️ Gestionare Status Comenzi</h2>
            <label>Cod Comandă (Ex: STF101):</label>
            <input type="text" id="order-id" placeholder="STF101">

            <label>Alege Statusul Nou:</label>
            <select id="order-status">
                <option value="Comandă Primită 📦">Comandă Primită 📦</option>
                <option value="În curs de pregătire 🛠️">În curs de pregătire 🛠️</option>
                <option value="Predată la Curier (Expediată) 🚚">Predată la Curier (Expediată) 🚚</option>
                <option value="Livrată cu succes! ✅">Livrată cu succes! ✅</option>
            </select>

            <label>Detalii/Mesaj pentru client:</label>
            <input type="text" id="order-desc" placeholder="Pachetul va ajunge în 1-2 zile.">

            <button onclick="salveazaStatusComanda()" style="background-color: #4caf50;">Adaugă / Actualizează Status</button>
            
            <h3>Statusuri active în cloud:</h3>
            <div class="item-list" id="lista-comenzi">Se încarcă...</div>
        </div>

        <div class="box">
            <h2>🏷️ Gestionare Coduri de Reducere</h2>
            <label>Nume Cod (Ex: PROMO20):</label>
            <input type="text" id="promo-name" placeholder="PROMO20">

            <label>Tip Reducere:</label>
            <select id="promo-type">
                <option value="suma">Suma Fixă (RON)</option>
                <option value="procent">Procentual (%)</option>
            </select>

            <label>Valoare (Ex: 5 pentru 5 RON sau 20 pentru 20%):</label>
            <input type="number" id="promo-val" placeholder="Valoare">

            <button onclick="salveazaCodReducere()" style="background-color: #2196f3;">Adaugă Cod de Reducere</button>

            <h3>Coduri active în cloud:</h3>
            <div class="item-list" id="lista-coduri">Se încarcă...</div>
        </div>
    </div>

    <script>
        const PAROLA_TA = "stefan889"; 
        
        // Datele tale JSONbin complet integrate
        const BIN_ID = "6a563aa6da38895dfe5bf942"; 
        const API_KEY = "$2a$10$4VMQMmdCSaGHLFzBFXLhmuxqeQKSPcoq9jFajTw6bf6xmxdoChqu.";

        let serverData = { coduriReducere: {}, statusuriComenzi: {} };

        function verificaParola() {
            const introdus = document.getElementById('pass-input').value;
            if (introdus === PAROLA_TA) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panels').style.display = 'block';
                incarcaDateDinCloud();
            } else {
                alert("Parolă incorectă!");
            }
        }

        async function incarcaDateDinCloud() {
            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                let json = await res.json();
                serverData = json.record;
                afiseazaListe();
            } catch (e) {
                alert("Eroare la încărcarea datelor din cloud!");
            }
        }

        async function salveazaDateInCloud() {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": API_KEY,
                        "X-Bin-Versioning": "false" // Forțează scrierea peste fișierul curent (fără versiuni)
                    },
                    body: JSON.stringify(serverData)
                });
                afiseazaListe();
            } catch (e) {
                alert("Eroare la salvarea în cloud!");
            }
        }

        function afiseazaListe() {
            // Afisare comenzi active
            const listaComenzi = document.getElementById('lista-comenzi');
            listaComenzi.innerHTML = "";
            for (let cod in serverData.statusuriComenzi) {
                let cmd = serverData.statusuriComenzi[cod];
                listaComenzi.innerHTML += `
                    <div>
                        <span><strong>${cod}</strong>: ${cmd.status}</span>
                        <button class="delete-btn" onclick="stergeComanda('${cod}')">Șterge</button>
                    </div>`;
            }

            // Afisare coduri de reducere active
            const listaCoduri = document.getElementById('lista-coduri');
            listaCoduri.innerHTML = "";
            for (let cod in serverData.coduriReducere) {
                let promo = serverData.coduriReducere[cod];
                let textPromo = promo.tip === 'procent' ? `-${promo.valoare}%` : `-${promo.valoare} RON`;
                listaCoduri.innerHTML += `
                    <div>
                        <span><strong>${cod}</strong>: ${textPromo}</span>
                        <button class="delete-btn" onclick="stergeCod('${cod}')">Șterge</button>
                    </div>`;
            }
        }

        function salveazaStatusComanda() {
            const cod = document.getElementById('order-id').value.trim().toUpperCase();
            const status = document.getElementById('order-status').value;
            const desc = document.getElementById('order-desc').value;

            if (!cod) return alert("Introdu codul comenzii!");

            serverData.statusuriComenzi[cod] = { status, descriere: desc };
            salveazaDateInCloud();
            alert("Status actualizat global!");
            
            // Curata campurile din formular
            document.getElementById('order-id').value = "";
            document.getElementById('order-desc').value = "";
        }

        function stergeComanda(cod) {
            if (confirm(`Sigur vrei să ștergi comanda ${cod}?`)) {
                delete serverData.statusuriComenzi[cod];
                salveazaDateInCloud();
            }
        }

        function salveazaCodReducere() {
            const nume = document.getElementById('promo-name').value.trim().toUpperCase();
            const tip = document.getElementById('promo-type').value;
            const val = parseFloat(document.getElementById('promo-val').value);

            if (!nume || isNaN(val)) return alert("Date invalide!");

            serverData.coduriReducere[nume] = { tip, valoare: val };
            salveazaDateInCloud();
            alert("Cod de reducere adăugat global!");

            // Curata campurile din formular
            document.getElementById('promo-name').value = "";
            document.getElementById('promo-val').value = "";
        }

        function stergeCod(nume) {
            if (confirm(`Sigur vrei să ștergi codul de reducere ${nume}?`)) {
                delete serverData.coduriReducere[nume];
                salveazaDateInCloud();
            }
        }
    </script>
</body>
</html>
